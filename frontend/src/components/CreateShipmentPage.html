<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Shipment</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

background:linear-gradient(135deg,#4f8cff,#7fd6ff);

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

}

.container{

width:520px;

padding:40px;

background:white;

border-radius:15px;

box-shadow:0 20px 40px rgba(0,0,0,0.2);

}

h2{

text-align:center;

margin-bottom:25px;

}

/* FORM */

.form-group{

margin-bottom:15px;

}

label{

display:block;

margin-bottom:5px;

font-size:14px;

}

input,select{

width:100%;

padding:10px;

border-radius:6px;

border:1px solid #ddd;

}

/* BUTTON */

button{

width:100%;

padding:12px;

margin-top:10px;

border:none;

border-radius:8px;

background:linear-gradient(90deg,#4f8cff,#3a6eea);

color:white;

font-size:16px;

cursor:pointer;

}

button:hover{

transform:translateY(-2px);

}

/* TRACKING RESULT */

.result{

margin-top:20px;

padding:12px;

background:#eef4ff;

border-radius:8px;

text-align:center;

font-weight:bold;

}

/* LINK */

.switch{

margin-top:20px;

text-align:center;

}

.switch a{

text-decoration:none;

color:#4f8cff;

font-weight:600;

}

</style>

</head>

<body>

<div class="container">

<h2>Create Shipment</h2>

<form id="shipmentForm">

<div class="form-group">
<label>Sender Name</label>
<input type="text" id="senderName" required>
</div>

<div class="form-group">
<label>Receiver Name</label>
<input type="text" id="receiverName" required>
</div>

<div class="form-group">
<label>Receiver Address</label>
<input type="text" id="receiverAddress" required>
</div>

<div class="form-group">
<label>Parcel Weight (kg)</label>
<input type="number" id="weight" required>
</div>

<div class="form-group">
<label>Shipping Type</label>
<select id="shippingType">
<option value="standard">Standard</option>
<option value="express">Express</option>
</select>
</div>

<button type="submit">Create Shipment</button>

</form>

<div id="trackingResult" class="result" style="display:none;"></div>

<div class="switch">
<a href="AdminLoginPage.html">Back to Admin</a>
</div>

</div>

<script>

document.getElementById("shipmentForm").addEventListener("submit", async function(e){

e.preventDefault()

const data={

senderName:document.getElementById("senderName").value,
receiverName:document.getElementById("receiverName").value,
receiverAddress:document.getElementById("receiverAddress").value,
weight:document.getElementById("weight").value,
shippingType:document.getElementById("shippingType").value

}

try{

const response=await fetch("http://localhost:3000/api/parcels",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

})

const result=await response.json()

if(response.ok){

document.getElementById("trackingResult").style.display="block"

document.getElementById("trackingResult").innerHTML=

`Shipment created! Tracking Number: ${result.trackingNumber}`

}else{

alert(result.message)

}

}catch(error){

alert("Server error")

}

})

</script>

</body>

</html>
