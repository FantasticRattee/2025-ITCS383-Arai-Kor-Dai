<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

background:linear-gradient(135deg,#4f8cff,#7fd6ff);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

/* DASHBOARD CARD */

.dashboard{

width:700px;

background:white;

padding:40px;

border-radius:15px;

box-shadow:0 20px 40px rgba(0,0,0,0.2);

}

h2{

text-align:center;

margin-bottom:30px;

}

/* GRID MENU */

.menu{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:20px;

}

/* MENU CARD */

.card{

padding:25px;

border-radius:12px;

text-align:center;

background:#f5f7ff;

cursor:pointer;

transition:0.3s;

}

.card:hover{

transform:translateY(-5px);

box-shadow:0 10px 20px rgba(0,0,0,0.15);

}

.card i{

font-size:30px;

margin-bottom:10px;

color:#4f8cff;

}

.card h3{

font-size:18px;

}

/* LOGOUT */

.logout{

margin-top:25px;

text-align:center;

}

.logout button{

padding:10px 20px;

border:none;

border-radius:8px;

background:#ff4d4d;

color:white;

cursor:pointer;

}

.logout button:hover{

background:#d93636;

}

</style>

</head>

<body>

<div class="dashboard">

<h2>Admin Dashboard</h2>

<div class="menu">

<div class="card" onclick="goCreateShipment()">
<i class="fa fa-box"></i>
<h3>Create Shipment</h3>
</div>

<div class="card" onclick="goTracking()">
<i class="fa fa-search"></i>
<h3>Track Parcel</h3>
</div>

<div class="card" onclick="goParcelList()">
<i class="fa fa-list"></i>
<h3>View Parcels</h3>
</div>

<div class="card" onclick="goUpdateStatus()">
<i class="fa fa-edit"></i>
<h3>Update Parcel Status</h3>
</div>

</div>

<div class="logout">

<button onclick="logout()">Logout</button>

</div>

</div>

<script>

function goCreateShipment(){

window.location.href="CreateShipmentPage.html"

}

function goTracking(){

window.location.href="TrackingPage.html"

}

function goParcelList(){

window.location.href="ParcelListPage.html"

}

function goUpdateStatus(){

window.location.href="UpdateParcelStatusPage.html"

}

function logout(){

localStorage.removeItem("adminToken")

window.location.href="AdminLoginPage.html"

}

</script>

</body>

</html>
