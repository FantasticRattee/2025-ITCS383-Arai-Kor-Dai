<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#4f8cff,#7fd6ff);

}

/* CARD */

.container{

width:380px;

padding:40px;

border-radius:15px;

background:rgba(255,255,255,0.95);

backdrop-filter:blur(10px);

box-shadow:0 20px 40px rgba(0,0,0,0.2);

animation:fadeIn 0.7s ease;

}

h2{

text-align:center;
margin-bottom:25px;

}

/* INPUT */

.form-group{

margin-bottom:18px;
position:relative;

}

.form-group i{

position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#888;

}

.form-group input{

width:100%;

padding:12px 12px 12px 38px;

border-radius:8px;

border:1px solid #ddd;

outline:none;

transition:0.3s;

}

.form-group input:focus{

border-color:#4f8cff;

box-shadow:0 0 5px rgba(79,140,255,0.5);

}

/* BUTTON */

button{

width:100%;

padding:12px;

border:none;

border-radius:8px;

background:linear-gradient(90deg,#4f8cff,#3a6eea);

color:white;

font-size:16px;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:translateY(-2px);

box-shadow:0 5px 15px rgba(0,0,0,0.2);

}

/* LINK */

.switch{

margin-top:20px;

text-align:center;

font-size:14px;

}

.switch a{

color:#4f8cff;

font-weight:600;

text-decoration:none;

}

.switch a:hover{

text-decoration:underline;

}

/* ANIMATION */

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="container">

<h2>Admin Login</h2>

<form id="adminLoginForm">

<div class="form-group">
<i class="fa fa-user-shield"></i>
<input type="text" id="username" placeholder="Admin Username" required>
</div>

<div class="form-group">
<i class="fa fa-lock"></i>
<input type="password" id="password" placeholder="Password" required>
</div>

<button type="submit">Login as Admin</button>

</form>

<div class="switch">
<a href="LoginPage.html">Back to User Login</a>
</div>

</div>

<script>

document.getElementById("adminLoginForm").addEventListener("submit", async function(e){

e.preventDefault()

const username=document.getElementById("username").value
const password=document.getElementById("password").value

try{

const response=await fetch("http://localhost:3000/api/auth/admin-login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({username,password})

})

const result=await response.json()

if(response.ok){

localStorage.setItem("adminToken",result.token)

alert("Admin login successful")

window.location.href="AdminDashboard.html"

}else{

alert(result.message || "Login failed")

}

}catch(error){

alert("Server error")

}

})

</script>

</body>

</html>
